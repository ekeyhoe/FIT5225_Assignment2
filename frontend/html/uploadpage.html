<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/uploadpage.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer>
      fetch("sidebar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("sidebar-container").innerHTML = data;
        });
    </script>
    <title>Upload</title>
  </head>
  <body>
    <div id="sidebar-container"></div>

    <div class="maincontent">
      <div class="pagetitle">Upload Image/Video</div>
      <div class="pagecontent">
        <input type="file" id="file-input" style="display: none" />
        <button class="btn" id="fileuploadbtn" onclick="openFilePicker()">
          Select an image/video to upload
        </button>
        <p>Files selected:</p>
        <p>example.png</p>
        <button class="btn" id="filesubmitbtn" onclick="processFiles()">
          Submit files
        </button>
      </div>
    </div>
  </body>
</html>
