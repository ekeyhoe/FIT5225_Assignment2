<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/uploadpage.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script defer>
      fetch("sidebar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("sidebar-container").innerHTML = data;
        });
    </script>

    <script>
      let fileInput;
      let dropZone;

      function updateFileDisplay(files) {
        if (files.length > 0) {
          const names = Array.from(files)
            .map((f) => f.name)
            .join(", ");

          document.getElementById("selected-file-name").textContent =
            `${files.length} file(s): ${names}`;
        } else {
          document.getElementById("selected-file-name").textContent =
            "No file selected";
        }
      }

      function openFilePicker() {
        fileInput.click();
      }

      async function processFiles() {
        const files = fileInput.files;

        if (!files || files.length === 0) {
          alert("Please select files first");
          return;
        }

        const formData = new FormData();

        for (let i = 0; i < files.length; i++) {
          formData.append("files", files[i]);
        }

        try {
          const response = await fetch("http://localhost:8000/upload", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();
          console.log(data);

          alert("Upload successful");
        } catch (error) {
          console.error(error);
          alert("Upload failed");
        }
      }

      function initUpload() {
        fileInput = document.getElementById("file-input");
        dropZone = document.getElementById("drop-zone");

        // file picker change
        fileInput.addEventListener("change", () => {
          updateFileDisplay(fileInput.files);
        });

        // click to open picker
        dropZone.addEventListener("click", () => {
          fileInput.click();
        });

        // drag over
        dropZone.addEventListener("dragover", (e) => {
          e.preventDefault();
          dropZone.classList.add("dragover");
        });

        // drag leave
        dropZone.addEventListener("dragleave", () => {
          dropZone.classList.remove("dragover");
        });

        // drop files
        dropZone.addEventListener("drop", (e) => {
          e.preventDefault();
          dropZone.classList.remove("dragover");

          const files = e.dataTransfer.files;
          fileInput.files = files;

          updateFileDisplay(files);
        });
      }

      document.addEventListener("DOMContentLoaded", initUpload);
    </script>

    <title>Upload</title>
  </head>

  <body>
    <div id="sidebar-container"></div>

    <div class="maincontent">
      <div class="pagetitle">Upload Image/Video</div>

      <div class="pagecontent">
        <input
          type="file"
          id="file-input"
          style="display: none"
          accept="image/*,video/*"
          multiple
        />

        <div id="drop-zone" class="drop-zone">
          Drag & drop images/videos here or click to select
        </div>

        <p id="selected-file-name">No files selected</p>

        <button class="btn" id="filesubmitbtn" onclick="processFiles()">
          Submit files
        </button>
      </div>
    </div>
  </body>
</html>
