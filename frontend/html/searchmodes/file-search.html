<!-- use id file-input to get user's inputted file search, replace openFilePicker() with actual function for user to pick file, replace searchFile() with tagging & searchtag function -->
<div class="row">
  <input type="file" id="file-input" style="display: none" />
  <button id="filesearchbtn" onclick="openFilePicker()">
    Upload file to search by
  </button>
  <button id="searchbtn" class="mainfunctionbtn" onclick="searchFile()">
    Search
  </button>
</div>

<div class="row">
  <div class="paragraphs">
    <p class="searchinfotxt">Upload a file to find matching images</p>
    <p id="selected-file-name">No file currently selected</p>
  </div>

  <button
    id="multi-selectbtn"
    class="mainfunctionbtn"
    onclick="toggleMultiSelect()"
  >
    Multi-Select
  </button>
</div>

<div id="multiSelectActions" class="multi-select-actions">
  <button class="hiddenbtn" id="addtagbtn">Add Tag</button>
  <button class="hiddenbtn" id="removetagbtn">Remove Tag</button>
  <button class="hiddenbtn" id="delete-btn">Delete Image(s)</button>
</div>
