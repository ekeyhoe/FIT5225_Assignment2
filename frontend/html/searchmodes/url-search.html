<!-- use id url-input to get the user's inputted url search, replace searchURL() function with the actual function created to search for image URL -->
<div class="row">
  <input id="url-input" class="input" placeholder="Input URL to search by..." />

  <button id="searchbtn" class="mainfunctionbtn" onclick="searchURL()">
    Search
  </button>
</div>

<div class="row">
  <div class="paragraphs">
    <p class="searchinfotxt">Input the URL of the image</p>
  </div>

  <button
    id="multi-selectbtn"
    class="mainfunctionbtn"
    onclick="toggleMultiSelect()"
  >
    Multi-Select
  </button>
</div>
<div id="multiselect-container"></div>
