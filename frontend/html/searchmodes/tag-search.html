<!-- use id tag-input to get the user's inputted search, replace searchTags() function with the actual function created to search for the right images -->
<div class="row">
  <input
    id="tag-input"
    class="input"
    placeholder="Input tags to search by..."
  />
  <button id="searchbtn" class="mainfunctionbtn" onclick="searchTags()">
    Search
  </button>
</div>

<div class="row">
  <div class="paragraphs">
    <p class="searchinfotxt">
      e.g. '{"dingo"}' will return all images with at least 1 dingo
    </p>
    <p class="searchinfotxt">e.g. '{"wombat":2, "magpie":1}'</p>
  </div>

  <button
    id="multi-selectbtn"
    class="mainfunctionbtn"
    onclick="toggleMultiSelect()"
  >
    Multi-Select
  </button>
</div>
<div id="multiselect-container"></div>
