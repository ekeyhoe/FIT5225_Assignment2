<!-- use id tag-input to get the user's tag search, replace searchTags() function with the actual function created to search for image tags -->
<div class="row">
  <input
    id="tag-input"
    class="input"
    placeholder="Input tags to search by..."
  />
  <button id="searchbtn" class="mainfunctionbtn" onclick="searchTags()">
    Search
  </button>
</div>

<div class="row">
  <div class="paragraphs">
    <p class="searchinfotxt">
      e.g. '{"dingo"}' will return all images with at least 1 dingo
    </p>
    <p class="searchinfotxt">e.g. '{"wombat":2, "magpie":1}'</p>
  </div>

  <button
    id="multi-selectbtn"
    class="mainfunctionbtn"
    onclick="toggleMultiSelect()"
  >
    Multi-Select
  </button>
</div>

<div id="multiSelectActions" class="multi-select-actions">
  <button class="hiddenbtn" id="addtagbtn">Add Tag</button>
  <button class="hiddenbtn" id="removetagbtn">Remove Tag</button>
  <button class="hiddenbtn" id="delete-btn">Delete Image(s)</button>
</div>
